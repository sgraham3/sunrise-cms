name: Coverage Testing

on:
  push:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:

permissions: read-all

jobs:
  Ubuntu-Coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

    name: Ubuntu - Node ${{ matrix.node }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Global Dependencies
        run: npm install -g c8

      - name: Install Application (CI)
        id: installCi
        continue-on-error: true
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Install Application (Install)
        if: steps.installCi.outcome == 'failure'
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Install Puppeteer Browser
        continue-on-error: true
        run: node node_modules/puppeteer/install.mjs

      - name: Copy Test Config
        run: cp ./data/testing.config.js ./data/config.js

      - name: Test Application Startup
        run: npm run test:startup

      - name: Verify Cypress
        run: npm run cy:verify
        env:
          CYPRESS_VERIFY_TIMEOUT: 600000

      - name: Run Coverage Testing
        run: npm run coverage

      - name: Codecov
        if: ${{ (success() || failure()) && github.event_name != 'pull_request' && env.CODECOV_TOKEN != '' && matrix.node == 22 }}
        run: |
          curl -Os https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov -t ${CODECOV_TOKEN}

      - name: Archive Cypress downloads and error screenshots
        if: ${{ (success() || failure()) }}
        uses: actions/upload-artifact@v6
        with:
          name: cy-ubuntu-node-${{ matrix.node }}
          path: |
            cypress/downloads/*
            cypress/screenshots/**/*.png
            cypress/videos/**/*.mp4
          if-no-files-found: ignore
