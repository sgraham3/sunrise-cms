version: "3.9"

services:
  sunrise-cms:
    image: ghcr.io/sgraham3/sunrise-cms:latest
    container_name: sunrise-cms

    ports:
      - "8080:8080"

    environment:
      NODE_ENV: production
      PORT: 8080

    volumes:
      - ./data:/app/data
      - ./database:/app/database

    restart: unless-stopped
